---
# Gateway exposes an HTTP listener on port 80.
# The infrastructure.parametersRef links this Gateway to the GatewayParameters
# above, which injects the NLB annotations onto the backing Service.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: aws-cloud
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      name: custom-gw-params
      group: gateway.kgateway.dev
      kind: GatewayParameters
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
